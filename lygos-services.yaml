version: 1
dockerComposePath: "$LYGOS_PATH/lygos-dev/docker-compose.yml"
envFile: "$LYGOS_PATH/lygos-dev/.env"

services:
  bitcoin:
    type: docker
    autoStart: false
    ports: [18443]
    healthCheck: { type: docker }

  electrs:
    type: docker
    autoStart: false
    ports: [50000, 30000]
    depends: [bitcoin]
    healthCheck: { type: docker }

  esplora:
    type: docker
    autoStart: false
    ports: [5002]
    depends: [electrs]

  postgres:
    type: docker
    autoStart: false
    ports: [5432]
    healthCheck: { type: docker }

  mongo:
    type: docker
    autoStart: false
    ports: [27017]

  electrs-batch-server:
    type: docker
    autoStart: false
    ports: [5001]

  anvil:
    type: docker
    autoStart: false
    ports: [8545]
    healthCheck: { type: docker }

  dlcd-rs:
    type: process
    autoStart: false
    cwd: "$LYGOS_PATH/dlc-dev-kit/dlcd"
    command: "cargo run"
    ports: [8575, 28575]
    depends: [bitcoin, electrs, postgres]
    healthCheck: { type: http, url: "http://localhost:8575/health" }

  orange-grove-backend:
    type: process
    autoStart: false
    cwd: "$LYGOS_PATH/orange-grove/core"
    command: "pnpm start:dev"
    ports: [3001]
    depends: [postgres]
    healthCheck: { type: http, url: "http://localhost:3001/health" }

  admin-ui:
    type: process
    autoStart: false
    cwd: "$LYGOS_PATH/orange-grove/admin-ui"
    command: "pnpm dev"
    ports: [3002]

  mocknolia:
    type: process
    autoStart: false
    cwd: "$LYGOS_PATH/mocknolia"
    command: "yarn dev"
    ports: [9002]

tasks:
  block-generator:
    command: "docker exec lygos-dev-bitcoin-1 bitcoin-cli -regtest -rpcuser=admin1 -rpcpassword=123 generatetoaddress 6 bcrt1qxwt28fujrxa69qu22ctzd3fmgsknl2sus4j97d"
    intervalSeconds: 30
    depends: [bitcoin]
    autoStart: false
