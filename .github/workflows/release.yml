name: Release Desktop

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next patch version
        id: version
        run: |
          latest=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"
          next_patch=$((patch + 1))
          new_version="${major}.${minor}.${next_patch}"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"
          echo "Next version: v$new_version (bumped from $latest)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-15-intel
            platform: mac
            target: dmg
            arch: x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
          # - label: Windows x64
          #   runner: windows-2022
          #   platform: win
          #   target: nsis
          #   arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build desktop artifact
        shell: bash
        run: |
          bun run dist:desktop:artifact -- \
            --platform "${{ matrix.platform }}" \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.arch }}" \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            if [[ -f release-publish/latest-mac.yml ]]; then
              mv release-publish/latest-mac.yml "release-publish/latest-mac-${{ matrix.arch }}.yml"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        run: |
          node scripts/merge-mac-update-manifests.ts \
            release-assets/latest-mac.yml \
            release-assets/latest-mac-x64.yml
          rm -f release-assets/latest-mac-x64.yml

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Lygos Dev ${{ needs.preflight.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/latest*.yml
          fail_on_unmatched_files: true
